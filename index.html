<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<!-- Without this, mobile browsers fake-render the page at ~980px and scale
     down to fit — making all the fixed-px UI text shrink to unreadable. -->
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>Long Nyan Cat Challenge</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Permanent+Marker&family=Fredoka:wght@400;600&display=swap" rel="stylesheet">
<style>
  * { box-sizing: border-box; }

  /* Native horizontal scrolling — same pattern as longdogechallenge.com
     (vertical there, horizontal here). No wheel hijack: the browser does
     the scrolling. Document width grows organically as more rainbow pieces
     are appended via IntersectionObserver. */
  html {
    overflow-x: auto;
    overflow-y: hidden;
  }
  body {
    margin: 0;
    padding: 0;
    height: 100vh;
    color: #fff;
    font-family: 'Fredoka', 'Courier New', monospace;
    background: radial-gradient(circle at center, #005093 0%, #002953 100%);
    background-attachment: fixed;
    /* pan-x: native horizontal panning works for left/right swipes; vertical
       swipes don't trigger pull-to-refresh / page-scroll, leaving them free
       for our touchmove handler to translate into horizontal scroll. */
    touch-action: pan-x;
    overscroll-behavior: none;
  }

  .title {
    position: fixed;
    top: 14px;
    left: 24px;
    font-family: 'Permanent Marker', cursive;
    font-size: 30px;
    color: #fff;
    text-shadow: 2px 2px 0 #ff3f8a;
    z-index: 100;
  }

  .print-btn {
    position: fixed;
    top: 14px;
    right: 24px;
    font-family: 'Permanent Marker', cursive;
    font-size: 30px;
    cursor: pointer;
    background: none;
    border: none;
    color: #fff;
    text-shadow: 2px 2px 0 #00a8ff;
    z-index: 100;
  }
  .print-btn:hover { color: #ffe84a; }

  .status {
    position: fixed;
    top: 64px;
    left: 24px;
    font-size: 16px;
    line-height: 1.4;
    z-index: 100;
    background: rgba(0,0,0,0.55);
    padding: 6px 10px;
    border-radius: 8px;
  }
  .status b { font-weight: 700; color: #ffe84a; }

  .hint {
    position: fixed;
    bottom: 60px;
    left: 50%;
    transform: translateX(-50%);
    font-size: 13px;
    color: #ccc;
    pointer-events: none;
    background: rgba(0,0,0,0.4);
    padding: 4px 10px;
    border-radius: 6px;
  }

  /* Mobile: bump the fixed-position UI text and tighten layout. The viewport
     meta tag now renders at device-width (1 CSS px = ~1 device px), so 30px
     reads correctly — but a touch larger title and padding feel right at hand. */
  @media (max-width: 600px) {
    .title     { font-size: 36px; top: 12px; left: 14px; text-shadow: 2px 2px 0 #ff3f8a; }
    .print-btn { font-size: 22px; top: 18px; right: 14px; padding: 6px 10px; }
    .status    { font-size: 18px; top: 70px; left: 14px; padding: 8px 12px; line-height: 1.5; }
    .hint      { font-size: 15px; bottom: 30px; padding: 6px 12px; }
  }

  /* Cat scene lives in the document flow (NOT fixed), so as more rainbow
     pieces are appended, the document grows wider and native horizontal
     scroll covers the new ground — exactly mirroring longdogechallenge's
     vertical layout (head at top of doc, body extends downward, body
     height grows with each injected neck). Here: cat at left of doc, trail
     extends rightward, body width grows with each injected rainbow piece.
     Vertical centering done by .nyan-scene being a 100vh flex container. */
  .nyan-scene {
    display: flex;
    flex-direction: row;
    align-items: center;
    height: 100vh;
    padding-left: calc(75vw - 340px);
    /* Cat's RIGHT edge sits at 75vw, leaving 1/4 of the viewport (25vw) of
       empty space to the right of the cat at scrollX=0. 340px = .nyan-cat
       width. As the user scrolls right, the cat slides off-left and the
       rainbow trail fills the viewport. */
    width: max-content;   /* let the row grow as wide as its children sum */
  }

  .nyan-cat {
    flex-shrink: 0;
    width: 340px;
    height: 210px;
    position: relative;
    animation: bob 0.45s ease-in-out infinite alternate;
    animation-play-state: paused;
    z-index: 5;
  }
  /* Cat is flipped to face LEFT (running right→left), so the rainbow trail
     naturally flows out the back of the cat to the RIGHT across the screen. */
  .nyan-cat svg { width: 100%; height: 100%; display: block; image-rendering: pixelated; transform: scaleX(-1); }
  /* pause both the outer bob AND every inner frame animation while idle.
     !important is needed because the inner SVG uses ID selectors (#cat-frame1, ...)
     which have higher specificity than our descendant selector. */
  .nyan-cat, .nyan-cat * { animation-play-state: paused !important; }
  body.moving .nyan-cat, body.moving .nyan-cat * { animation-play-state: running !important; }
  /* freeze on frame1 when idle so the cat is visible at rest */
  body:not(.moving) .nyan-cat .cat-frame { opacity: 0; }
  body:not(.moving) .nyan-cat #cat-frame1 { opacity: 1; }

  @keyframes bob {
    from { transform: translateY(0); }
    to   { transform: translateY(-10px); }
  }

  /* Horizontal rainbow row: pieces are 60×108 with vertical color stripes,
     stacked left→right. Pieces zig-zag vertically in alternating phase +
     the whole row gently bobs horizontally. */
  .rainbow {
    flex-shrink: 0;
    height: 140px;
    margin-left: -40px;
    display: flex;
    flex-direction: row;
    align-items: center;
    image-rendering: pixelated;
    animation: rainbow-row-bob 0.42s steps(1) infinite;
    animation-play-state: paused;
  }
  .rainbow-piece {
    flex-shrink: 0;
    width: 60px;
    height: 108px;
    background: linear-gradient(
      to bottom,
      #FD1B00 0%, #FD1B00 16.66%,
      #FD9B01 16.66%, #FD9B01 33.33%,
      #FDEF01 33.33%, #FDEF01 50%,
      #20DB01 50%, #20DB01 66.66%,
      #008AFC 66.66%, #008AFC 83.33%,
      #6D3FFC 83.33%, #6D3FFC 100%
    );
    animation: rainbow-piece-zig 0.42s steps(1) infinite;
    animation-play-state: paused;
    /* Isolate each piece so layout/style/paint changes don't ripple across
       siblings. Critical for keeping scroll smooth as the piece count grows
       into the thousands — without this, every paint walks the full row. */
    contain: layout style paint;
  }
  /* Alternating phase: even pieces zig in sync, odd pieces are 180° out of phase */
  .rainbow-piece:nth-child(odd)  { animation-delay: 0s; }
  .rainbow-piece:nth-child(even) { animation-delay: -0.21s; }

  body.moving .rainbow,
  body.moving .rainbow-piece { animation-play-state: running; }

  @keyframes rainbow-piece-zig {
    0%, 49.99%   { transform: translateY(0); }
    50%, 100%    { transform: translateY(8px); }
  }
  @keyframes rainbow-row-bob {
    0%, 49.99%   { transform: translateX(0); }
    50%, 100%    { transform: translateX(-6px); }
  }

  /* Pixelated fade on the trailing (right) end of the rainbow so it doesn't
     just cut off flat. Dark on the far right, transparent where it meets the rainbow. */
  .rainbow-end {
    flex-shrink: 0;
    width: 60px;
    height: 140px;
    background: linear-gradient(to left, #08081a, rgba(8,8,26,0));
    margin-left: -40px;
  }

  /* Print: each printed page = one viewport. Pages = how many viewport-widths
     the user has scrolled across (1 if they haven't scrolled). The print
     button handler dynamically builds N page-divs (one per viewport slice)
     and injects an @page rule whose size matches the live viewport. The
     static @media print rules below (1) hide UI chrome, (2) freeze the cat
     on a single animation frame for a clean print, and (3) make the
     dynamic #print-root visible. */
  @media print {
    @page { size: landscape; margin: 0; }   /* fallback for direct Cmd+P */

    html, body {
      overflow: visible !important;
      height: auto !important;
      width: auto !important;
      background: #002953 !important;
      -webkit-print-color-adjust: exact;
      print-color-adjust: exact;
    }

    /* When the print-flow is active, hide everything in <body> EXCEPT the
       dynamically-built #print-root + the title/status overlays (which
       become absolute so they appear once at the top of page 1). */
    body.printing > * { display: none !important; }
    body.printing > #print-root { display: block !important; }
    body.printing > .title,
    body.printing > .status {
      display: block !important;
      position: absolute !important;
      color: #fff !important;
      background: rgba(0,0,0,0.55);
      z-index: 999;
    }

    /* Each page is exactly one viewport. overflow:hidden clips the slice;
       page-break-after pushes the next slice to a fresh page. */
    .print-page {
      position: relative;
      overflow: hidden;
      page-break-after: always;
      break-after: page;
      background: radial-gradient(circle at center, #005093 0%, #002953 100%);
    }
    .print-page:last-child {
      page-break-after: auto;
      break-after: auto;
    }

    /* Freeze cat on frame1 inside print pages so the printed cat isn't a
       half-rendered mid-animation blank. */
    .print-page .nyan-cat,
    .print-page .nyan-cat * { animation: none !important; }
    .print-page .nyan-cat .cat-frame { opacity: 0 !important; }
    .print-page .nyan-cat #cat-frame1 { opacity: 1 !important; }

    /* Kill rainbow zig-zag so adjacent slices line up flat across page boundaries. */
    .print-page .rainbow,
    .print-page .rainbow-piece {
      animation: none !important;
      transform: none !important;
    }

    /* Hide the dark fade end-cap inside print pages */
    .print-page .rainbow-end { display: none !important; }

    /* Fallback path (direct Cmd+P without clicking the button): keep the
       basic clean-pose styling on the live scene so it isn't half-animated. */
    .print-btn, .hint { display: none !important; }
    .nyan-cat, .nyan-cat * { animation: none !important; }
    .nyan-cat .cat-frame { opacity: 0 !important; }
    .nyan-cat #cat-frame1 { opacity: 1 !important; }
    .rainbow, .rainbow-piece { animation: none !important; transform: none !important; }
  }
  /* On screen, the dynamically-built print container is hidden. */
  @media screen {
    #print-root { display: none; }
  }

</style>

<script>
  /* Mirror of longdogechallenge.com's scroll-driven growth, but rotated 90°:
     the original injects more <pre class="neck"> blocks BELOW as you scroll
     DOWN; we inject more .rainbow-piece blocks to the RIGHT as you scroll
     RIGHT. Two trigger paths, exactly like the original:
       1) IntersectionObserver on the LAST piece — when it enters within
          200% of the viewport width of the right edge, append more pieces
          and switch the observer to the new last piece.
       2) onscroll fallback — if the user scrolls all the way to the right
          edge of the document (rare; observer almost always pre-fires),
          force-inject another batch.                                       */
  const countEl  = document.getElementById('count');
  const adjEl    = document.getElementById('adj');
  const rainbow  = document.getElementById('rainbow');
  const PIECE_WIDTH    = 60;   // each .rainbow-piece is 60px wide
  const PIECES_PER_BATCH = 40; // how many pieces injected per growth event

  function makePiece() {
    const p = document.createElement('div');
    p.className = 'rainbow-piece';
    return p;
  }

  function injectPieces() {
    const frag = document.createDocumentFragment();
    let lastPiece = null;
    for (let i = 0; i < PIECES_PER_BATCH; i++) {
      const p = makePiece();
      frag.appendChild(p);
      lastPiece = p;
    }
    rainbow.appendChild(frag);
    // Hand the observer to the new last piece, dropping the previous one.
    if (lastPiece) {
      observer.disconnect();
      observer.observe(lastPiece);
    }
    updateMiles();
  }

  // rootMargin extends the observer "trigger zone" by 200% of the viewport
  // WIDTH on the right side — same idea as the original's "0px 0px 200% 0px"
  // (which extends the bottom edge by 200% of viewport HEIGHT).
  const observer = new IntersectionObserver((entries) => {
    for (const entry of entries) {
      if (entry.intersectionRatio > 0) {
        injectPieces();
        break; // only one growth event per tick
      }
    }
  }, { rootMargin: '0px 200% 0px 0px' });

  // Seed enough pieces to fill the initial viewport before the observer kicks in.
  const seedCount = Math.ceil((window.innerWidth * 1.5) / PIECE_WIDTH);
  for (let i = 0; i < seedCount; i++) rainbow.appendChild(makePiece());
  // Start observing the seeded last piece.
  if (rainbow.lastElementChild) observer.observe(rainbow.lastElementChild);

  function adjective(n) {
    if (n < 5)    return 'smol';
    if (n < 20)   return 'kinda';
    if (n < 60)   return 'pretty';
    if (n < 150)  return 'very';
    if (n < 400)  return 'super';
    if (n < 1000) return 'wow';
    if (n < 5000) return 'infinite';
    return 'transcendent';
  }

  function updateMiles() {
    // Miles count = how far the user has actually scrolled horizontally.
    const miles = Math.floor(window.scrollX / 100);
    countEl.textContent = miles.toLocaleString();
    adjEl.textContent   = adjective(miles);
  }

  let moveTimer = null;
  function markMoving() {
    document.body.classList.add('moving');
    if (moveTimer) clearTimeout(moveTimer);
    moveTimer = setTimeout(() => document.body.classList.remove('moving'), 120);
  }

  /* Wheel-axis translation, rAF-throttled.
     The original site's wheel "just works" because its scroll axis is vertical
     (matches a mouse wheel's natural axis). Our axis is horizontal, so a
     regular wheel mouse (only deltaY) would do nothing without this translator.
     We accumulate wheel deltas and apply ONE scrollBy per animation frame —
     calling scrollBy on every wheel event triggers reflow per event and
     visibly lags. Only intervene when input is predominantly vertical; if the
     user is already producing deltaX (trackpad horizontal, shift+wheel),
     leave the browser alone. */
  let pendingWheelDelta = 0;
  let wheelRafId = 0;
  function flushWheel() {
    wheelRafId = 0;
    if (pendingWheelDelta !== 0) {
      window.scrollBy({ left: pendingWheelDelta, top: 0, behavior: 'auto' });
      pendingWheelDelta = 0;
    }
  }
  window.addEventListener('wheel', (e) => {
    if (Math.abs(e.deltaY) > Math.abs(e.deltaX)) {
      pendingWheelDelta += e.deltaY;
      if (!wheelRafId) wheelRafId = requestAnimationFrame(flushWheel);
      e.preventDefault();
    }
  }, { passive: false });

  /* Touch: on mobile, vertical swipes get translated to horizontal scroll so
     the cat moves forward when you swipe up (finger moves up the screen) and
     backward when you swipe down. Horizontal swipes pass through to native
     pan-x (set on body) so left/right drag works as expected.
     Detection: classify the gesture by which axis dominates total displacement
     since touchstart. If vertical wins, hijack and translate; otherwise leave
     it alone for native pan. rAF-throttled to coalesce multiple touchmove
     events per frame. */
  let pendingTouchDelta = 0;
  let touchRafId = 0;
  function flushTouch() {
    touchRafId = 0;
    if (pendingTouchDelta !== 0) {
      window.scrollBy({ left: pendingTouchDelta, top: 0, behavior: 'auto' });
      pendingTouchDelta = 0;
    }
  }
  let lastTouchY = null, touchStartX = null, touchStartY = null;
  window.addEventListener('touchstart', (e) => {
    if (e.touches.length === 1) {
      const t = e.touches[0];
      lastTouchY = t.clientY;
      touchStartX = t.clientX;
      touchStartY = t.clientY;
    } else {
      // Multi-touch (pinch zoom etc.) — release control.
      lastTouchY = null;
    }
  }, { passive: true });
  window.addEventListener('touchmove', (e) => {
    if (lastTouchY === null || e.touches.length !== 1) return;
    const t = e.touches[0];
    const totalDx = Math.abs(t.clientX - touchStartX);
    const totalDy = Math.abs(t.clientY - touchStartY);
    // Only hijack vertical-dominant gestures; horizontal goes to native pan-x.
    if (totalDy > totalDx) {
      // Swipe UP (finger moves up, dy<0) → cat forward (scroll RIGHT, dx>0).
      pendingTouchDelta += -(t.clientY - lastTouchY);
      if (!touchRafId) touchRafId = requestAnimationFrame(flushTouch);
      e.preventDefault();
    }
    lastTouchY = t.clientY;
  }, { passive: false });
  function resetTouch() { lastTouchY = null; }
  window.addEventListener('touchend', resetTouch, { passive: true });
  window.addEventListener('touchcancel', resetTouch, { passive: true });

  /* Arrow / Page / Home / End / Space — make the trail advance whichever
     axis the user instinctively reaches for. */
  window.addEventListener('keydown', (e) => {
    const KEY_STEP = 80;
    const PAGE_STEP = window.innerWidth * 0.9;
    let dx = 0;
    if (e.key === 'ArrowDown' || e.key === 'ArrowRight') dx = KEY_STEP;
    else if (e.key === 'ArrowUp' || e.key === 'ArrowLeft') dx = -KEY_STEP;
    else if (e.key === 'PageDown' || e.key === ' ')       dx = PAGE_STEP;
    else if (e.key === 'PageUp')                          dx = -PAGE_STEP;
    else if (e.key === 'Home')                            { window.scrollTo(0, 0); return; }
    else if (e.key === 'End')                             { window.scrollTo(document.documentElement.scrollWidth, 0); return; }
    else return;
    window.scrollBy({ left: dx, top: 0, behavior: 'auto' });
    e.preventDefault();
  });

  /* Scroll listener, rAF-throttled. Scroll events fire 60+ times/sec on
     trackpads and each handler invocation reads scrollX (forces layout) and
     toggles DOM — coalesce into one update per frame. */
  let scrollRafId = 0;
  function handleScroll() {
    scrollRafId = 0;
    updateMiles();
    markMoving();
    /* "At end of doc" fallback. CRITICAL: must use documentElement.scrollWidth,
       NOT body.offsetWidth — body is a block element, so its width is locked
       to its containing block (html = viewport) regardless of how wide its
       content overflows. body.offsetWidth would always equal innerWidth here,
       making this check fire on every scroll event and runaway-injecting
       pieces (the lag source). scrollWidth includes the overflow correctly. */
    if (window.innerWidth + window.pageXOffset >= document.documentElement.scrollWidth - 1) {
      injectPieces();
    }
  }
  window.addEventListener('scroll', () => {
    if (!scrollRafId) scrollRafId = requestAnimationFrame(handleScroll);
  }, { passive: true });

  updateMiles();

  /* Print flow: 1 viewport = 1 page, page count = number of viewport-widths
     the user has scrolled across. Build N viewport-sized .print-page divs,
     each containing a clone of the scene shifted by translateX(-i*vw) so it
     shows the i-th horizontal slice. Inject @page {size: vw vh} so each
     printed page matches the live viewport exactly. After window.print()
     returns (or the dialog closes), tear everything back down. */
  document.getElementById('printBtn').addEventListener('click', () => {
    const vw = window.innerWidth;
    const vh = window.innerHeight;
    // ceil((scrollX + vw) / vw) → 1 page when scrollX=0, 2 when scrolled vw, etc.
    const numPages = Math.max(1, Math.ceil((window.scrollX + vw) / vw));
    const totalContentWidth = numPages * vw;

    // Make sure the rainbow extends across all requested pages so the last
    // page doesn't end in mid-air. Inject batches until the scroll-width is
    // wide enough. Use documentElement.scrollWidth (NOT body.offsetWidth) for
    // the same reason as the scroll handler — body.offsetWidth is locked to
    // the viewport since html is the scroll container.
    let safety = 200; // hard cap to prevent infinite loop on a stuck layout
    while (document.documentElement.scrollWidth < totalContentWidth && safety-- > 0) {
      injectPieces();
    }

    // Build the print-only DOM: N pages, each a viewport-sized window into
    // the same wide scene, shifted leftward by i*vw to reveal the i-th slice.
    const scene = document.querySelector('.nyan-scene');
    const printRoot = document.createElement('div');
    printRoot.id = 'print-root';
    for (let i = 0; i < numPages; i++) {
      const page = document.createElement('div');
      page.className = 'print-page';
      page.style.cssText = `width: ${vw}px; height: ${vh}px;`;
      const slice = scene.cloneNode(true);
      slice.style.cssText = `position: absolute; left: 0; top: 0; transform: translateX(${-i * vw}px);`;
      page.appendChild(slice);
      printRoot.appendChild(page);
    }
    document.body.appendChild(printRoot);

    // Inject @page rule sized to the live viewport. !important needed because
    // the static @media print block has a fallback @page { size: landscape }.
    const styleEl = document.createElement('style');
    styleEl.id = 'dynamic-print-style';
    styleEl.textContent = `@media print { @page { size: ${vw}px ${vh}px !important; margin: 0 !important; } }`;
    document.head.appendChild(styleEl);

    document.body.classList.add('printing');

    // Give layout one frame to settle, then trigger the print dialog.
    requestAnimationFrame(() => {
      window.print();
      // Tear-down. window.print() blocks in some browsers and returns
      // immediately in others; setTimeout covers both cases.
      setTimeout(() => {
        document.body.classList.remove('printing');
        styleEl.remove();
        printRoot.remove();
      }, 1500);
    });
  });
</script>

</body>
</html>
